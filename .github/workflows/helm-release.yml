name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'helm/klone-operator/**'
      - '.github/workflows/helm-release.yml'
  workflow_run:
    workflows: ["Build and Push Operator Image"]
    types:
      - completed
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: check_changes
        run: |
          # If workflow_dispatch or workflow_run, always release
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any Helm chart files changed
          if git diff --name-only HEAD^ HEAD | grep -E '^helm/klone-operator/'; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Helm
        if: steps.check_changes.outputs.should_release == 'true'
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint Helm chart
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          helm lint helm/klone-operator

      - name: Package Helm chart
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          mkdir -p .helm-releases
          helm package helm/klone-operator -d .helm-releases

      - name: Checkout gh-pages branch
        if: steps.check_changes.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repository index
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          # Create helm-charts directory if it doesn't exist
          mkdir -p gh-pages/helm-charts

          # Copy new chart package
          cp .helm-releases/*.tgz gh-pages/helm-charts/

          # Update or create index
          cd gh-pages/helm-charts
          if [ -f index.yaml ]; then
            helm repo index . --url https://raghavendiran-2002.github.io/klone/helm-charts --merge index.yaml
          else
            helm repo index . --url https://raghavendiran-2002.github.io/klone/helm-charts
          fi

      - name: Commit and push to gh-pages
        if: steps.check_changes.outputs.should_release == 'true'
        run: |
          cd gh-pages
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add helm-charts/
          git commit -m "chore: Release Helm chart $(helm show chart ../helm/klone-operator | grep '^version:' | awk '{print $2}')" || echo "No changes to commit"
          git push

      - name: Get chart version
        if: steps.check_changes.outputs.should_release == 'true'
        id: chart_version
        run: |
          VERSION=$(helm show chart helm/klone-operator | grep '^version:' | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_changes.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: helm-chart-v${{ steps.chart_version.outputs.version }}
          name: Helm Chart v${{ steps.chart_version.outputs.version }}
          body: |
            ## Klone Operator Helm Chart v${{ steps.chart_version.outputs.version }}

            ### Installation

            ```bash
            # Add the Helm repository
            helm repo add klone https://raghavendiran-2002.github.io/klone/helm-charts
            helm repo update

            # Install the chart
            helm install klone-operator klone/klone-operator \\
              --namespace klone \\
              --create-namespace
            ```

            ### What's Changed
            See the [commit history](https://github.com/Raghavendiran-2002/klone/commits/main) for details.
          files: .helm-releases/*.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release message
        if: steps.check_changes.outputs.should_release != 'true'
        run: echo "No relevant changes detected. Skipping release."
