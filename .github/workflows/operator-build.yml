name: Build and Push Operator Image

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'internal/**'
      - 'cmd/**'
      - 'config/**'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'vendor/**'
      - '.github/workflows/operator-build.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: klone-operator
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: check_changes
        run: |
          # If workflow_dispatch, always build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any relevant files changed
          if git diff --name-only HEAD^ HEAD | grep -E '^(api/|internal/|cmd/|config/|Dockerfile|go\.(mod|sum)|vendor/)'; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract current version
        if: steps.check_changes.outputs.should_build == 'true'
        id: get_version
        run: |
          # Get current version from Chart.yaml
          CURRENT_VERSION=$(grep '^version:' helm/klone-operator/Chart.yaml | awk '{print $2}')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Increment patch version
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $NEW_VERSION"

      - name: Set up QEMU
        if: steps.check_changes.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.check_changes.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: steps.check_changes.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.new_tag }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update version in manifests
        if: steps.check_changes.outputs.should_build == 'true'
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.new_version }}"
          NEW_TAG="${{ steps.get_version.outputs.new_tag }}"

          # Update Helm Chart
          sed -i "s/^version: .*/version: $NEW_VERSION/" helm/klone-operator/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$NEW_TAG\"/" helm/klone-operator/Chart.yaml

          # Update Helm values
          sed -i "s|tag: .*|tag: $NEW_TAG|" helm/klone-operator/values.yaml

          # Update kustomization
          cd config/manager && kustomize edit set image controller=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$NEW_TAG

      - name: Commit and push version updates
        if: steps.check_changes.outputs.should_build == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/klone-operator/Chart.yaml
          git add helm/klone-operator/values.yaml
          git add config/manager/kustomization.yaml

          git commit -m "chore: Update operator to ${{ steps.get_version.outputs.new_tag }}" || echo "No changes to commit"
          git push

      - name: Create and push tag
        if: steps.check_changes.outputs.should_build == 'true'
        run: |
          git tag "operator-${{ steps.get_version.outputs.new_tag }}"
          git push origin "operator-${{ steps.get_version.outputs.new_tag }}"

      - name: Skip build message
        if: steps.check_changes.outputs.should_build != 'true'
        run: echo "No relevant changes detected. Skipping build."
