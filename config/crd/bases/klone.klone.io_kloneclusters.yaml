---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: kloneclusters.klone.klone.io
spec:
  group: klone.klone.io
  names:
    kind: KloneCluster
    listKind: KloneClusterList
    plural: kloneclusters
    singular: klonecluster
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KloneCluster is the Schema for the kloneclusters API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of KloneCluster
            properties:
              argoCD:
                description: argoCD configuration for cluster registration with host
                  ArgoCD
                properties:
                  clusterName:
                    description: |-
                      clusterName is the name to use when registering the cluster in ArgoCD
                      If not specified, defaults to "klone-{cluster-name}"
                    type: string
                  enabled:
                    description: |-
                      enabled determines if the cluster should be registered with host ArgoCD
                      If not specified, auto-detection is used (checks for ArgoCD in host cluster)
                    type: boolean
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      labels are additional labels to add to the registered cluster in ArgoCD
                      Default label 'cluster-type=klone' is always added
                    type: object
                  namespace:
                    default: argocd
                    description: namespace is the namespace where ArgoCD is installed
                      in the host cluster
                    type: string
                type: object
              ingress:
                description: ingress configuration for external access
                properties:
                  loadBalancer:
                    description: loadBalancer specific configuration
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: annotations for the Ingress resource
                        type: object
                      certificateArn:
                        description: certificateArn for HTTPS listener
                        type: string
                      externalDNS:
                        description: externalDNS configuration
                        properties:
                          hostname:
                            description: hostname for DNS record
                            type: string
                          ttl:
                            default: 300
                            description: ttl for DNS record
                            format: int32
                            type: integer
                        type: object
                      scheme:
                        default: internet-facing
                        description: scheme is the load balancer scheme (internet-facing
                          or internal)
                        enum:
                        - internet-facing
                        - internal
                        type: string
                    type: object
                  tailscale:
                    description: tailscale specific configuration
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: annotations for the Ingress resource
                        type: object
                      domain:
                        description: domain is the Tailscale network domain
                        type: string
                      tags:
                        description: tags for Tailscale device
                        items:
                          type: string
                        type: array
                    type: object
                  type:
                    default: tailscale
                    description: 'type of ingress: tailscale, loadbalancer, or none'
                    enum:
                    - tailscale
                    - loadbalancer
                    - none
                    type: string
                type: object
              k3s:
                description: k3s configuration for the nested cluster
                properties:
                  controlPlane:
                    description: controlPlane configuration
                    properties:
                      replicas:
                        default: 1
                        description: replicas is the number of control plane instances
                        format: int32
                        minimum: 1
                        type: integer
                      resources:
                        description: resources for control plane pods
                        properties:
                          limits:
                            additionalProperties:
                              type: string
                            description: limits describes the maximum resources allowed
                            type: object
                          requests:
                            additionalProperties:
                              type: string
                            description: requests describes the minimum resources
                              required
                            type: object
                        type: object
                    type: object
                  image:
                    default: rancher/k3s:v1.35.1-k3s1
                    description: image is the k3s container image
                    type: string
                  token:
                    default: supersecrettoken123
                    description: token is the shared secret for k3s agent authentication
                    type: string
                  worker:
                    description: worker configuration
                    properties:
                      replicas:
                        default: 2
                        description: replicas is the number of worker nodes
                        format: int32
                        minimum: 0
                        type: integer
                      resources:
                        description: resources for worker pods
                        properties:
                          limits:
                            additionalProperties:
                              type: string
                            description: limits describes the maximum resources allowed
                            type: object
                          requests:
                            additionalProperties:
                              type: string
                            description: requests describes the minimum resources
                              required
                            type: object
                        type: object
                    type: object
                type: object
              metricsServer:
                description: metricsServer configuration for auto-installation
                properties:
                  enabled:
                    default: true
                    description: enabled determines if metrics-server should be auto-installed
                    type: boolean
                  image:
                    default: registry.k8s.io/metrics-server/metrics-server:v0.7.0
                    description: image for metrics-server
                    type: string
                type: object
              networking:
                description: networking configuration for cluster and service CIDRs
                properties:
                  clusterCIDR:
                    description: clusterCIDR for pod network (auto-generated if empty)
                    type: string
                  serviceCIDR:
                    description: serviceCIDR for service network (auto-generated if
                      empty)
                    type: string
                type: object
              storage:
                description: storage configuration for persistent volumes
                properties:
                  hostPath:
                    default: /home/raghav/klone
                    description: hostPath base directory for cluster data
                    type: string
                  nodeAffinity:
                    description: nodeAffinity for PV binding
                    properties:
                      enabled:
                        default: false
                        description: enabled determines if node affinity is used
                        type: boolean
                      label:
                        default: primary
                        description: label is the node label key for affinity (e.g.,
                          workload=primary)
                        type: string
                    type: object
                  size:
                    default: 5Gi
                    description: size of the persistent volume
                    type: string
                  storageClass:
                    default: local-path
                    description: storageClass for PVC
                    type: string
                type: object
              terminal:
                description: terminal configuration for web-based access
                properties:
                  image:
                    default: alpine:3.19
                    description: image for the terminal container
                    type: string
                  replicas:
                    default: 1
                    description: replicas is the number of terminal instances
                    format: int32
                    type: integer
                  resources:
                    description: resources for terminal pod
                    properties:
                      limits:
                        additionalProperties:
                          type: string
                        description: limits describes the maximum resources allowed
                        type: object
                      requests:
                        additionalProperties:
                          type: string
                        description: requests describes the minimum resources required
                        type: object
                    type: object
                type: object
            required:
            - k3s
            - storage
            type: object
          status:
            description: status defines the observed state of KloneCluster
            properties:
              argoCDClusterName:
                description: argoCDClusterName is the name used when registering the
                  cluster in ArgoCD
                type: string
              argoCDRegistered:
                description: argoCDRegistered indicates if the cluster has been registered
                  with host ArgoCD
                type: boolean
              clusterCIDR:
                description: clusterCIDR is the actual CIDR assigned to the cluster
                type: string
              conditions:
                description: |-
                  conditions represent the current state of the KloneCluster resource.
                  Condition types:
                  - "Ready": all components are running and healthy
                  - "TerminalReady": terminal pod is ready and accessible
                  - "IngressReady": ingress is configured and accessible
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              ingressURL:
                description: ingressURL is the URL to access the cluster terminal
                type: string
              loadBalancerHostname:
                description: loadBalancerHostname is the hostname of the load balancer
                  (if using ALB)
                type: string
              metricsServerInstalled:
                description: metricsServerInstalled indicates if metrics-server was
                  successfully installed
                type: boolean
              namespace:
                description: namespace is the namespace where cluster resources are
                  deployed
                type: string
              persistentVolume:
                description: persistentVolume is the name of the PV created for this
                  cluster
                type: string
              phase:
                description: phase represents the current lifecycle phase of the cluster
                enum:
                - Creating
                - Running
                - Terminating
                - Failed
                type: string
              serviceCIDR:
                description: serviceCIDR is the actual CIDR assigned for services
                type: string
              workloads:
                description: workloads tracks the status of created workloads
                items:
                  description: WorkloadStatus represents the status of a workload
                  properties:
                    desired:
                      description: desired is the desired number of replicas
                      format: int32
                      type: integer
                    kind:
                      description: kind is the workload kind (StatefulSet or Deployment)
                      type: string
                    name:
                      description: name is the workload name
                      type: string
                    ready:
                      description: ready is the number of ready replicas
                      format: int32
                      type: integer
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
