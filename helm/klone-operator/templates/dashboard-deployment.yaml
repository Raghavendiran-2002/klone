apiVersion: apps/v1
kind: Deployment
metadata:
  name: klone-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    app: klone-dashboard
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.dashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.dashboard.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app: klone-dashboard
  template:
    metadata:
      labels:
        app: klone-dashboard
        {{- with .Values.dashboard.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.dashboard.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: dashboard
        image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
        imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: ADMIN_USERNAME
          value: {{ .Values.dashboard.admin.username | quote }}
        - name: ADMIN_PASSWORD
          value: {{ .Values.dashboard.admin.password | quote }}
        resources:
          {{- toYaml .Values.dashboard.resources | nindent 10 }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: klone-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    app: klone-dashboard
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    app: klone-dashboard
  ports:
  - port: {{ .Values.dashboard.service.port }}
    targetPort: {{ .Values.dashboard.service.targetPort }}
    protocol: TCP
    name: http
