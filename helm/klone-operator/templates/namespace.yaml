apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "klone-operator.namespace" . }}
  labels:
    {{- include "klone-operator.labels" . | nindent 4 }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
