<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>klone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #080d1a;
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(59,130,246,0.15) 0%, transparent 60%);
    }
    .cluster-card { transition: box-shadow 0.25s, border-color 0.25s; }
    .cluster-card:hover { box-shadow: 0 0 0 1px rgba(99,102,241,0.35), 0 4px 28px rgba(99,102,241,0.08); }
    #cluster-name:focus { box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
    #add-btn:active { transform: scale(0.97); }
  </style>
</head>
<body class="text-gray-100 min-h-screen">

  <!-- Sticky header -->
  <header class="sticky top-0 z-40 bg-[#080d1a]/85 backdrop-blur-md border-b border-white/[0.06]">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center shadow-lg shadow-blue-600/30 shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
        <div>
          <span class="font-bold text-sm bg-gradient-to-r from-blue-300 to-violet-400 bg-clip-text text-transparent tracking-tight">klone</span>
          <span class="text-gray-600 text-xs ml-2 hidden sm:inline">Klone Cluster Manager</span>
        </div>
      </div>
      <div class="flex items-center gap-4 text-xs">
        <div id="host-cpu-stat" class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
          </svg>
          <span class="text-gray-600">CPU:</span>
          <span id="host-cpu-value" class="text-gray-400 font-medium tabular-nums">--</span>
        </div>
        <div id="host-mem-stat" class="flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
          <span class="text-gray-600">Memory:</span>
          <span id="host-mem-value" class="text-gray-400 font-medium tabular-nums">--</span>
        </div>
        <div id="cluster-stats" class="text-gray-500 tabular-nums"></div>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">

    <!-- New cluster panel -->
    <div class="bg-[#0d1424]/80 border border-white/[0.07] rounded-2xl p-5 mb-8 backdrop-blur-sm">
      <p class="text-[10px] font-semibold text-gray-600 uppercase tracking-widest mb-3">New Cluster</p>
      <div class="flex gap-3">
        <div class="relative flex-1">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-600 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
          </svg>
          <input id="cluster-name" type="text"
            placeholder="e.g. dev, staging, prod"
            class="w-full bg-[#131c30] border border-white/[0.08] rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-blue-500/60 transition-all placeholder-gray-600"
            onkeydown="if(event.key==='Enter') addCluster()" />
        </div>
        <button id="add-btn" onclick="addCluster()"
          class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-all shadow-lg shadow-blue-600/20 hover:shadow-blue-500/30 disabled:opacity-60 disabled:cursor-not-allowed">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Add Cluster
        </button>
      </div>
    </div>

    <!-- Cluster grid -->
    <div id="clusters" class="grid gap-4"></div>

  </main>

  <!-- Terminal modal -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex flex-col" style="background:rgba(4,7,18,0.95)">
    <div class="flex items-center justify-between px-5 py-3 bg-[#080d1a] border-b border-white/[0.07]">
      <div class="flex items-center gap-3">
        <!-- macOS-style traffic lights -->
        <div class="flex gap-1.5">
          <div class="w-3 h-3 rounded-full bg-[#ff5f57] shadow-sm"></div>
          <div class="w-3 h-3 rounded-full bg-[#ffbd2e] shadow-sm"></div>
          <div class="w-3 h-3 rounded-full bg-[#28c840] shadow-sm"></div>
        </div>
        <span id="modal-title" class="text-sm font-medium text-gray-300 ml-1 font-mono"></span>
      </div>
      <div class="flex items-center gap-3">
        <a id="modal-open-tab" href="#" target="_blank"
          class="text-xs text-gray-600 hover:text-gray-300 flex items-center gap-1.5 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Open in tab
        </a>
        <button onclick="closeModal()"
          class="w-7 h-7 rounded-lg bg-white/[0.05] hover:bg-white/10 flex items-center justify-center text-gray-500 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="relative flex-1" style="background:#050912">
      <div id="terminal-loading"
        class="absolute inset-0 z-10 flex flex-col items-center justify-center">
        <div class="relative w-14 h-14 mb-5">
          <div class="absolute inset-0 rounded-full border-[3px] border-blue-500/15"></div>
          <div class="absolute inset-0 rounded-full border-[3px] border-transparent border-t-blue-500 animate-spin"></div>
          <div class="absolute inset-[5px] rounded-full border-2 border-transparent border-t-violet-500 animate-spin" style="animation-duration:1.4s;animation-direction:reverse"></div>
        </div>
        <p class="text-sm font-medium text-gray-400">Connecting to terminal</p>
        <p class="text-xs text-gray-700 mt-1.5">Polling until ready…</p>
      </div>
      <iframe id="terminal-frame"
        class="absolute inset-0 w-full h-full border-0"
        allow="clipboard-read; clipboard-write"
        onload="onTerminalLoad()">
      </iframe>
    </div>
  </div>

  <script>
    const TAILSCALE_DOMAIN = '__TAILSCALE_DOMAIN__';
    let activeModal = null;

    async function api(path, opts) {
      const res = await fetch(path, opts);
      if (!res.ok) {
        const body = await res.text();
        throw new Error(`${res.status}: ${body}`);
      }
      return res.json();
    }

    async function addCluster() {
      const input = document.getElementById('cluster-name');
      const btn   = document.getElementById('add-btn');
      const name  = input.value.trim().toLowerCase();
      if (!name) return;
      input.value = '';
      btn.disabled = true;
      btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Creating…`;
      try {
        await api('/api/clusters', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
      } catch (e) {
        alert('Error creating cluster: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Add Cluster`;
      }
      renderClusters();
    }

    async function deleteCluster(name, btn) {
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="w-3.5 h-3.5 border-2 border-red-600/40 border-t-red-400 rounded-full animate-spin inline-block"></span>`; }
      if (!confirm(`Delete cluster "${name}"? This cannot be undone.`)) {
        if (btn) { btn.disabled = false; btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>`; }
        return;
      }
      const card = document.getElementById(`cluster-${name}`);
      if (card) {
        card.style.transition = 'opacity 0.2s, transform 0.2s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.97)';
        setTimeout(() => {
          card.remove();
          if (!document.getElementById('clusters').children.length)
            document.getElementById('clusters').innerHTML = emptyState();
        }, 200);
      }
      try {
        await api(`/api/clusters/${name}`, { method: 'DELETE' });
      } catch (e) {
        alert('Error deleting cluster: ' + e.message);
        renderClusters();
      }
    }

    async function restartCluster(name, btn) {
      const origHTML = btn ? btn.innerHTML : '';
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="w-3.5 h-3.5 border-2 border-gray-600 border-t-gray-300 rounded-full animate-spin inline-block"></span>`; }
      try {
        await api(`/api/clusters/${name}/restart`, { method: 'POST' });
      } catch (e) {
        alert('Error restarting cluster: ' + e.message);
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
      }
    }

    function onTerminalLoad() {
      document.getElementById('terminal-loading').classList.add('hidden');
    }

    function openModal(name) {
      activeModal = name;
      document.getElementById('modal-title').textContent = name + ' — terminal';
      document.getElementById('terminal-loading').classList.remove('hidden');
      document.getElementById('terminal-frame').src = '';
      document.getElementById('modal-open-tab').href = `https://${name}-terminal.${TAILSCALE_DOMAIN}/`;
      document.getElementById('modal').classList.remove('hidden');
      pollUntilReady(name);
    }

    async function pollUntilReady(name) {
      while (activeModal === name) {
        try {
          const r = await fetch(`/api/clusters/${name}/terminal-probe`, { cache: 'no-store' });
          if (r.ok) break;          // 200 only when terminal HTTP is genuinely up
        } catch {}
        await new Promise(r => setTimeout(r, 500));
      }
      if (activeModal !== name) return;
      document.getElementById('terminal-frame').src = `/proxy/${name}/`;
    }

    function closeModal() {
      activeModal = null;
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('terminal-frame').src = '';
      document.getElementById('terminal-loading').classList.remove('hidden');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    let rendering = false;

    async function updateHostMetrics() {
      try {
        const data = await api('/api/metrics/host');

        // Calculate aggregate CPU and memory usage across all nodes
        let totalCpuPercent = 0;
        let totalMemPercent = 0;
        let nodeCount = data.nodes.length;

        data.nodes.forEach(node => {
          totalCpuPercent += node.cpu.percent;
          totalMemPercent += node.memory.percent;
        });

        const avgCpuPercent = nodeCount > 0 ? totalCpuPercent / nodeCount : 0;
        const avgMemPercent = nodeCount > 0 ? totalMemPercent / nodeCount : 0;

        // Update CPU display with color coding
        const cpuEl = document.getElementById('host-cpu-value');
        const cpuColor = avgCpuPercent > 80 ? 'text-red-400' : avgCpuPercent > 60 ? 'text-yellow-400' : 'text-green-400';
        cpuEl.className = `${cpuColor} font-medium tabular-nums`;
        cpuEl.textContent = `${avgCpuPercent.toFixed(1)}%`;

        // Update memory display with color coding
        const memEl = document.getElementById('host-mem-value');
        const memColor = avgMemPercent > 80 ? 'text-red-400' : avgMemPercent > 60 ? 'text-yellow-400' : 'text-green-400';
        memEl.className = `${memColor} font-medium tabular-nums`;
        memEl.textContent = `${avgMemPercent.toFixed(1)}%`;
      } catch (e) {
        console.error('Failed to fetch host metrics:', e);
        document.getElementById('host-cpu-value').textContent = 'N/A';
        document.getElementById('host-mem-value').textContent = 'N/A';
      }
    }

    // Track which clusters have had metrics loaded at least once
    const metricsLoaded = new Set();
    const metricsRefreshIntervals = new Map();
    const clusterPodMetrics = new Map(); // Store pod metrics for each cluster

    async function loadClusterMetrics(name) {
      const content = document.getElementById(`metrics-content-${name}`);
      if (!content) return;

      try {
        const data = await api(`/api/clusters/${name}/metrics`);

        // Store pod metrics for this cluster
        if (data.pods) {
          clusterPodMetrics.set(name, data.pods);
          // Update workload rows with metrics
          updateWorkloadMetrics(name);
        }

        let html = '';

        // Show node metrics
        if (data.nodes && data.nodes.length > 0) {
          html += '<div class="space-y-2"><div class="text-[10px] font-semibold text-gray-600 uppercase tracking-widest">Nodes</div>';
          data.nodes.forEach(node => {
            // Check if this is a fallback info message
            if (node.info) {
              html += `
                <div class="bg-[#0a0f1e] rounded-lg p-3">
                  <div class="text-xs text-gray-400 font-medium mb-2">${node.name}</div>
                  <div class="text-xs text-yellow-500/80 flex items-start gap-2">
                    <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>${node.info}</span>
                  </div>
                </div>`;
            } else if (node.cpu && node.memory) {
              const cpuColor = node.cpu.percent > 80 ? 'bg-red-500' : node.cpu.percent > 60 ? 'bg-yellow-500' : 'bg-green-500';
              const memColor = node.memory.percent > 80 ? 'bg-red-500' : node.memory.percent > 60 ? 'bg-yellow-500' : 'bg-green-500';
              html += `
                <div class="bg-[#0a0f1e] rounded-lg p-3 space-y-2">
                  <div class="text-xs text-gray-400 font-medium">${node.name}</div>
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] text-gray-600 w-12">CPU</span>
                    <div class="flex-1 h-1.5 bg-white/[0.06] rounded-full overflow-hidden">
                      <div class="${cpuColor} h-full rounded-full transition-all" style="width:${node.cpu.percent}%"></div>
                    </div>
                    <span class="text-[10px] text-gray-500 tabular-nums w-10 text-right">${node.cpu.percent.toFixed(1)}%</span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] text-gray-600 w-12">Memory</span>
                    <div class="flex-1 h-1.5 bg-white/[0.06] rounded-full overflow-hidden">
                      <div class="${memColor} h-full rounded-full transition-all" style="width:${node.memory.percent}%"></div>
                    </div>
                    <span class="text-[10px] text-gray-500 tabular-nums w-10 text-right">${node.memory.percent.toFixed(1)}%</span>
                  </div>
                  <div class="flex gap-3 text-[10px] text-gray-600 pt-1">
                    <div>${node.cpu.millicores}m / ${(node.cpu.millicores / (node.cpu.percent / 100)).toFixed(0)}m</div>
                    <div>${node.memory.mib}Mi / ${(node.memory.mib / (node.memory.percent / 100)).toFixed(0)}Mi</div>
                  </div>
                </div>`;
            }
          });
          html += '</div>';
        }

        // Show namespace summary
        if (data.namespaces && data.namespaces.length > 0) {
          const totalCpu = data.namespaces.reduce((sum, ns) => sum + ns.cpu_millicores, 0);
          const totalMem = data.namespaces.reduce((sum, ns) => sum + ns.memory_mib, 0);
          const totalPods = data.namespaces.reduce((sum, ns) => sum + ns.pod_count, 0);
          html += `
            <div class="mt-3 space-y-2">
              <div class="text-[10px] font-semibold text-gray-600 uppercase tracking-widest">Workload Summary</div>
              <div class="bg-[#0a0f1e] rounded-lg p-3 grid grid-cols-3 gap-3">
                <div>
                  <div class="text-[10px] text-gray-600">Total CPU</div>
                  <div class="text-sm text-blue-400 font-semibold tabular-nums">${totalCpu}m</div>
                </div>
                <div>
                  <div class="text-[10px] text-gray-600">Total Memory</div>
                  <div class="text-sm text-violet-400 font-semibold tabular-nums">${totalMem}Mi</div>
                </div>
                <div>
                  <div class="text-[10px] text-gray-600">Pods</div>
                  <div class="text-sm text-green-400 font-semibold tabular-nums">${totalPods}</div>
                </div>
              </div>
            </div>`;
        }

        if (!html) {
          html = '<div class="text-xs text-gray-600">Metrics not available yet. Wait for k3s to start.</div>';
        }

        content.innerHTML = html;
        metricsLoaded.add(name);
      } catch (e) {
        console.error(`Failed to fetch metrics for ${name}:`, e);
        content.innerHTML = '<div class="text-xs text-red-500">Failed to load metrics</div>';
      }
    }

    function startMetricsRefresh(name) {
      // Clear any existing interval for this cluster
      if (metricsRefreshIntervals.has(name)) {
        clearInterval(metricsRefreshIntervals.get(name));
      }

      // Load metrics immediately
      loadClusterMetrics(name);

      // Set up periodic refresh every 10 seconds
      const intervalId = setInterval(() => {
        const content = document.getElementById(`metrics-content-${name}`);
        // Only refresh if the cluster card still exists
        if (content) {
          loadClusterMetrics(name);
        } else {
          // Cluster was deleted, clean up interval
          clearInterval(intervalId);
          metricsRefreshIntervals.delete(name);
          metricsLoaded.delete(name);
          clusterPodMetrics.delete(name);
        }
      }, 10000);

      metricsRefreshIntervals.set(name, intervalId);
    }

    function emptyState() {
      return `<div class="flex flex-col items-center justify-center py-24">
        <div class="w-14 h-14 rounded-2xl bg-[#0d1424] border border-white/[0.07] flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
        <p class="text-gray-400 font-medium text-sm">No clusters yet</p>
        <p class="text-gray-600 text-xs mt-1">Enter a name above and click Add Cluster</p>
      </div>`;
    }

    function statusDot(state) {
      if (state === 'Running') return `<span class="relative flex w-2.5 h-2.5 shrink-0"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-50"></span><span class="relative inline-flex w-2.5 h-2.5 rounded-full bg-green-400"></span></span>`;
      if (state === 'Error')   return `<span class="relative flex w-2.5 h-2.5 shrink-0"><span class="relative inline-flex w-2.5 h-2.5 rounded-full bg-red-400"></span></span>`;
      return `<span class="relative flex w-2.5 h-2.5 shrink-0"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-50"></span><span class="relative inline-flex w-2.5 h-2.5 rounded-full bg-yellow-400"></span></span>`;
    }

    function stateBadge(state) {
      const cls = state === 'Running' ? 'bg-green-500/10 text-green-400 border-green-500/20'
                : state === 'Error'   ? 'bg-red-500/10 text-red-400 border-red-500/20'
                :                       'bg-yellow-500/10 text-yellow-400 border-yellow-500/20';
      return `<span class="text-[11px] px-2 py-0.5 rounded-full font-medium border ${cls} w-fit">${state}</span>`;
    }

    function workloadRows(workloads, podMetrics) {
      if (!workloads || !workloads.length) return '';

      // Helper to aggregate pod metrics for a workload
      const getWorkloadMetrics = (workloadName) => {
        if (!podMetrics || !podMetrics.length) return null;

        // Find all pods matching this workload (by prefix)
        const matchingPods = podMetrics.filter(p => p.name.startsWith(workloadName));
        if (!matchingPods.length) return null;

        const totalCpu = matchingPods.reduce((sum, p) => sum + p.cpu_millicores, 0);
        const totalMem = matchingPods.reduce((sum, p) => sum + p.memory_mib, 0);

        return { cpu: totalCpu, mem: totalMem };
      };

      const rows = workloads.map(w => {
        const pct  = w.desired > 0 ? Math.round((w.ready / w.desired) * 100) : 0;
        const bar  = w.ready >= w.desired ? 'bg-green-500' : w.ready > 0 ? 'bg-yellow-500' : 'bg-gray-600';
        const icon = w.kind === 'StatefulSet'
          ? `<svg class="w-3 h-3 text-blue-400/60 shrink-0" viewBox="0 0 20 20" fill="currentColor"><path d="M3 4a1 1 0 000 2h14a1 1 0 100-2H3zM3 9a1 1 0 000 2h14a1 1 0 100-2H3zM3 14a1 1 0 000 2h14a1 1 0 100-2H3z"/></svg>`
          : `<svg class="w-3 h-3 text-violet-400/60 shrink-0" viewBox="0 0 20 20" fill="currentColor"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM11 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2h-2zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2h-2z"/></svg>`;

        const metrics = getWorkloadMetrics(w.name);

        return `<div class="space-y-1.5">
            <div class="flex items-center gap-3">
              ${icon}
              <span class="text-xs text-gray-400 w-28 truncate">${w.name}</span>
              <div class="flex-1 h-1 bg-white/[0.06] rounded-full overflow-hidden">
                <div class="${bar} h-full rounded-full transition-all duration-700" style="width:${pct}%"></div>
              </div>
              <span class="text-xs text-gray-600 tabular-nums w-8 text-right">${w.ready}/${w.desired}</span>
            </div>
            ${metrics ? `
            <div class="ml-6 pl-3 border-l border-white/[0.06] space-y-1">
              <div class="flex items-center gap-2">
                <span class="text-[10px] text-gray-600 w-10">CPU</span>
                <div class="flex-1 h-1 bg-white/[0.04] rounded-full overflow-hidden">
                  <div class="bg-blue-500/70 h-full rounded-full transition-all" style="width: ${Math.min(100, (metrics.cpu / 1000) * 100)}%"></div>
                </div>
                <span class="text-[10px] text-gray-500 tabular-nums w-12 text-right">${metrics.cpu}m</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[10px] text-gray-600 w-10">Memory</span>
                <div class="flex-1 h-1 bg-white/[0.04] rounded-full overflow-hidden">
                  <div class="bg-violet-500/70 h-full rounded-full transition-all" style="width: ${Math.min(100, (metrics.mem / 2000) * 100)}%"></div>
                </div>
                <span class="text-[10px] text-gray-500 tabular-nums w-12 text-right">${metrics.mem}Mi</span>
              </div>
            </div>` : ''}
          </div>`;
      }).join('');
      return `<div class="mt-4 pt-3.5 border-t border-white/[0.06] space-y-3">${rows}</div>`;
    }

    const btnRestart = name => `
      <button onclick="restartCluster('${name}', this)" title="Restart"
        class="w-8 h-8 rounded-lg bg-[#131c30] hover:bg-[#1e2d4a] text-gray-500 hover:text-gray-300 flex items-center justify-center transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>`;

    const btnDelete = name => `
      <button onclick="deleteCluster('${name}', this)" title="Delete"
        class="w-8 h-8 rounded-lg bg-red-950/30 hover:bg-red-900/60 text-red-600/60 hover:text-red-400 flex items-center justify-center transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>`;

    function clusterCard(name, s) {
      if (!s) return `
<div id="cluster-${name}" class="cluster-card bg-[#0d1424]/90 border border-white/[0.07] rounded-2xl p-5">
  <div class="flex items-start justify-between">
    <div class="flex flex-col gap-2">
      <div class="flex items-center gap-2.5">
        <span class="relative flex w-2.5 h-2.5 shrink-0"><span class="relative inline-flex w-2.5 h-2.5 rounded-full bg-gray-700"></span></span>
        <h2 class="text-base font-semibold text-gray-200">${name}</h2>
      </div>
      <span class="text-[11px] px-2 py-0.5 rounded-full font-medium border bg-gray-800/50 text-gray-600 border-gray-700/40 w-fit">Connecting…</span>
    </div>
    <div class="flex gap-1.5">
      <button disabled class="h-8 px-3 rounded-lg bg-[#131c30] text-gray-700 text-xs font-medium flex items-center gap-1.5 cursor-not-allowed">
        <span class="w-2.5 h-2.5 border border-gray-700 border-t-transparent rounded-full animate-spin"></span>
        Initializing
      </button>
      ${btnRestart(name)}
      ${btnDelete(name)}
    </div>
  </div>
  <div class="mt-4 pt-3.5 border-t border-white/[0.06] space-y-2.5">
    <div class="flex items-center gap-3">
      <div class="w-3 h-3 rounded bg-gray-800/80 animate-pulse shrink-0"></div>
      <div class="h-1 bg-gray-800/80 rounded-full w-24 animate-pulse"></div>
      <div class="flex-1 h-1 bg-gray-800/50 rounded-full"></div>
      <div class="w-8 h-1 bg-gray-800/50 rounded-full animate-pulse"></div>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-3 h-3 rounded bg-gray-800/80 animate-pulse shrink-0"></div>
      <div class="h-1 bg-gray-800/80 rounded-full w-28 animate-pulse"></div>
      <div class="flex-1 h-1 bg-gray-800/50 rounded-full"></div>
      <div class="w-8 h-1 bg-gray-800/50 rounded-full animate-pulse"></div>
    </div>
    <div class="flex items-center gap-3">
      <div class="w-3 h-3 rounded bg-gray-800/80 animate-pulse shrink-0"></div>
      <div class="h-1 bg-gray-800/80 rounded-full w-20 animate-pulse"></div>
      <div class="flex-1 h-1 bg-gray-800/50 rounded-full"></div>
      <div class="w-8 h-1 bg-gray-800/50 rounded-full animate-pulse"></div>
    </div>
  </div>
</div>`;

      return `
<div id="cluster-${name}" class="cluster-card bg-[#0d1424]/90 border border-white/[0.07] rounded-2xl p-5">
  <div class="flex items-start justify-between">
    <div class="flex flex-col gap-2">
      <div class="flex items-center gap-2.5">
        ${statusDot(s.state)}
        <h2 class="text-base font-semibold text-white">${name}</h2>
      </div>
      ${stateBadge(s.state)}
    </div>
    <div class="flex gap-1.5">
      ${s.terminal_ready
        ? `<button onclick="openModal('${name}')"
            class="h-8 px-3.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold flex items-center gap-1.5 transition-all shadow-md shadow-blue-700/30 hover:shadow-blue-500/30 active:scale-95">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Connect
           </button>`
        : `<button disabled class="h-8 px-3 rounded-lg bg-[#131c30] text-gray-700 text-xs font-medium flex items-center gap-1.5 cursor-not-allowed">
            <span class="w-2.5 h-2.5 border border-gray-700 border-t-transparent rounded-full animate-spin"></span>
            Initializing
           </button>`
      }
      ${btnRestart(name)}
      ${btnDelete(name)}
    </div>
  </div>
  ${workloadRows(s.workloads, clusterPodMetrics.get(name) || null)}
  <div id="metrics-${name}" class="mt-4 pt-3.5 border-t border-white/[0.06]">
    <div class="flex items-center gap-2 text-xs text-gray-400 mb-3">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      <span>K3s Cluster Metrics</span>
    </div>
    <div id="metrics-content-${name}" class="space-y-3">
      <div class="text-xs text-gray-600">Loading metrics...</div>
    </div>
  </div>
</div>`;
    }

    function updateWorkloadMetrics(name) {
      const card = document.getElementById(`cluster-${name}`);
      if (!card) return;

      const podMetrics = clusterPodMetrics.get(name);
      if (!podMetrics) return;

      // Find the workloads container
      const workloadsContainer = card.querySelector('.mt-4.pt-3\\.5.border-t.border-white\\/\\[0\\.06\\].space-y-3');
      if (!workloadsContainer) return;

      // Get current workload state from the card
      // We need to re-extract workload info from the existing DOM
      const workloadEls = workloadsContainer.querySelectorAll('.space-y-1\\.5');
      const workloads = Array.from(workloadEls).map(el => {
        const nameEl = el.querySelector('.text-xs.text-gray-400');
        const readyEl = el.querySelector('.tabular-nums');
        if (!nameEl || !readyEl) return null;

        const name = nameEl.textContent.trim();
        const [ready, desired] = readyEl.textContent.split('/').map(n => parseInt(n));
        const icon = el.querySelector('svg');
        const kind = icon?.classList.contains('text-blue-400/60') ? 'StatefulSet' : 'Deployment';

        return { name, ready, desired, kind };
      }).filter(Boolean);

      // Re-render with metrics
      workloadsContainer.outerHTML = workloadRows(workloads, podMetrics);
    }

    function updateCardContent(name, status) {
      const card = document.getElementById(`cluster-${name}`);
      if (!card) return;

      // Update status dot
      const statusDotContainer = card.querySelector('.flex.items-center.gap-2\\.5');
      if (statusDotContainer) {
        statusDotContainer.innerHTML = `
          ${statusDot(status.state)}
          <h2 class="text-base font-semibold text-white">${name}</h2>
        `;
      }

      // Update status badge
      const statusBadgeContainer = statusDotContainer?.parentElement;
      if (statusBadgeContainer) {
        const badgeEl = statusBadgeContainer.querySelector('.text-\\[11px\\]');
        if (badgeEl) {
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = stateBadge(status.state);
          badgeEl.replaceWith(tempDiv.firstElementChild);
        }
      }

      // Update Connect/Initializing button
      const buttonContainer = card.querySelector('.flex.gap-1\\.5');
      if (buttonContainer) {
        const firstButton = buttonContainer.firstElementChild;
        if (firstButton) {
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = status.terminal_ready
            ? `<button onclick="openModal('${name}')"
                class="h-8 px-3.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold flex items-center gap-1.5 transition-all shadow-md shadow-blue-700/30 hover:shadow-blue-500/30 active:scale-95">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Connect
               </button>`
            : `<button disabled class="h-8 px-3 rounded-lg bg-[#131c30] text-gray-700 text-xs font-medium flex items-center gap-1.5 cursor-not-allowed">
                <span class="w-2.5 h-2.5 border border-gray-700 border-t-transparent rounded-full animate-spin"></span>
                Initializing
               </button>`;
          firstButton.replaceWith(tempDiv.firstElementChild);
        }
      }

      // Update workload rows with current pod metrics
      const podMetrics = clusterPodMetrics.get(name);
      const workloadsContainer = card.querySelector('.mt-4.pt-3\\.5.border-t');
      if (workloadsContainer) {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = workloadRows(status.workloads, podMetrics);
        workloadsContainer.outerHTML = tempDiv.firstElementChild.outerHTML;
      }
    }

    async function renderClusters() {
      if (rendering) return;
      rendering = true;
      try {
        const { clusters = [] } = await api('/api/clusters');
        const container = document.getElementById('clusters');

        if (!clusters.length) {
          container.innerHTML = emptyState();
          const statsEl = document.getElementById('cluster-stats');
          if (statsEl) statsEl.textContent = '';
          return;
        }

        const clusterNames = new Set(clusters.map(c => c.name));

        // Remove cards for deleted clusters
        const existingCards = container.querySelectorAll('[id^="cluster-"]');
        existingCards.forEach(card => {
          const name = card.id.replace('cluster-', '');
          if (!clusterNames.has(name)) {
            card.style.transition = 'opacity 0.2s, transform 0.2s';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.97)';
            setTimeout(() => card.remove(), 200);
          }
        });

        // Track stats
        let runningCount = 0;
        let filledCount = 0;

        // Process each cluster in parallel
        await Promise.all(clusters.map(async ({ name }) => {
          const card = document.getElementById(`cluster-${name}`);

          // Add skeleton card if it doesn't exist
          if (!card) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = clusterCard(name, null);
            container.appendChild(tempDiv.firstElementChild);
          }

          // Fetch status
          let status;
          try {
            status = await fetch(`/api/clusters/${name}/status`).then(r => r.json());
          } catch {
            status = { state: 'Error', workloads: [], terminal_ready: false };
          }

          // Update only the changed parts of the card
          if (document.getElementById(`cluster-${name}`)) {
            updateCardContent(name, status);

            // Start metrics refresh for Running clusters
            if (status.state === 'Running' && !metricsRefreshIntervals.has(name)) {
              startMetricsRefresh(name);
            }
          }

          filledCount++;
          if (status.state === 'Running') runningCount++;
        }));

        // Update cluster counter
        const el = document.getElementById('cluster-stats');
        if (el) {
          el.innerHTML = `<span class="text-green-400 font-medium">${runningCount}</span><span class="text-gray-600"> / ${clusters.length} running</span>`;
        }
      } catch(e) {
        console.error('Failed to fetch clusters:', e);
      } finally {
        rendering = false;
      }
    }

    renderClusters();
    setInterval(renderClusters, 8000);
    updateHostMetrics();
    setInterval(updateHostMetrics, 15000);
  </script>
</body>
</html>
