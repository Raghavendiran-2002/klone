{{- if .Values.klone.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: klone-terminal
  namespace: {{ .Values.klone.namespace }}
  labels:
    app: klone-terminal
    {{- include "klone.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.klone.terminal.replicas }}
  selector:
    matchLabels:
      app: klone-terminal
  template:
    metadata:
      labels:
        app: klone-terminal
    spec:
      containers:
        - name: terminal
          image: {{ .Values.klone.terminal.image }}
          command:
            - /bin/sh
            - -c
            - |
              CACHE=/k3s/term-cache
              mkdir -p "$CACHE"

              ARCH=$(uname -m)
              [ "$ARCH" = "aarch64" ] && KARCH=arm64 || KARCH=amd64

              # bash — install once, flag in PVC cache so restarts skip the APK download
              if [ ! -f "$CACHE/.bash-installed" ]; then
                echo 'Installing bash (first run)...'
                apk add --no-cache bash
                touch "$CACHE/.bash-installed"
              else
                apk add --no-cache --no-network bash 2>/dev/null || apk add --no-cache bash
              fi

              # kubectl — download once, reuse from PVC cache on restarts
              if [ ! -x "$CACHE/kubectl" ]; then
                echo 'Caching kubectl (first run)...'
                wget -qO "$CACHE/kubectl" "https://dl.k8s.io/release/v1.28.5/bin/linux/$KARCH/kubectl"
                chmod +x "$CACHE/kubectl"
              fi
              ln -sf "$CACHE/kubectl" /usr/local/bin/kubectl

              # ttyd — download once, reuse from PVC cache on restarts
              if [ ! -x "$CACHE/ttyd" ]; then
                echo 'Caching ttyd (first run)...'
                if [ "$ARCH" = "aarch64" ]; then
                  TTYD_URL="https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.aarch64"
                else
                  TTYD_URL="https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64"
                fi
                wget -qO "$CACHE/ttyd" "$TTYD_URL"
                chmod +x "$CACHE/ttyd"
              fi
              ln -sf "$CACHE/ttyd" /usr/local/bin/ttyd

              mkdir -p /root/.kube

              while [ ! -f /k3s/kubeconfig.yaml ]; do
                echo 'Waiting for kubeconfig...'
                sleep 2
              done

              cp /k3s/kubeconfig.yaml /root/.kube/config
              sed -i 's/127.0.0.1/k3s-control-plane.{{ .Values.klone.namespace }}.svc.cluster.local/' /root/.kube/config

              echo "alias k=kubectl" >> /root/.bashrc

              exec ttyd --port 7681 --writable bash
          ports:
            - containerPort: 7681
          readinessProbe:
            tcpSocket:
              port: 7681
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 40
          volumeMounts:
            - name: k3s-storage
              mountPath: /k3s
      volumes:
        - name: k3s-storage
          persistentVolumeClaim:
            claimName: k3s-data
{{- end }}
