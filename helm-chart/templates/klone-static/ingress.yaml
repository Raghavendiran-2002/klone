{{- if .Values.klone.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: klone-terminal
  namespace: {{ .Values.klone.namespace }}
  labels:
    {{- include "klone.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.class }}
  tls:
    - hosts:
        - {{ .Values.klone.ingress.host }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: klone-terminal
                port:
                  name: terminal
{{- end }}
