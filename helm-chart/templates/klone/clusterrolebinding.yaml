{{- if .Values.kloneApi.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: klone
  labels:
    {{- include "klone.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: klone
subjects:
  - kind: ServiceAccount
    name: klone
    namespace: {{ .Values.kloneApi.namespace }}
{{- end }}
