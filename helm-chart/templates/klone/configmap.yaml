{{- if .Values.kloneApi.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: klone
  namespace: {{ .Values.kloneApi.namespace }}
  labels:
    {{- include "klone.labels" . | nindent 4 }}
data:
  requirements.txt: |
{{ .Files.Get "files/requirements.txt" | indent 4 }}
  main.py: |
{{ .Files.Get "files/main.py" | indent 4 }}
  index.html: |
{{ .Files.Get "files/index.html" | indent 4 }}
{{- end }}
