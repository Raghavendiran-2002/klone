{{- if .Values.kloneApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: klone
  namespace: {{ .Values.kloneApi.namespace }}
  labels:
    app: klone
    {{- include "klone.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kloneApi.replicas }}
  selector:
    matchLabels:
      app: klone
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: klone
    spec:
      serviceAccountName: klone
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      {{- if .Values.kloneApi.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: In
                    values:
                      - {{ .Values.kloneApi.nodeAffinity.label }}
      {{- end }}
      initContainers:
        - name: install-deps
          image: {{ .Values.kloneApi.image }}
          command:
            - sh
            - -c
            - |
              pip install --no-cache-dir -r /config/requirements.txt -t /app/deps &&
              cp /config/main.py /app/main.py
          volumeMounts:
            - name: klone-code
              mountPath: /config
              readOnly: true
            - name: app
              mountPath: /app
      containers:
        - name: server
          image: {{ .Values.kloneApi.image }}
          command:
            - python
            - /app/main.py
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PYTHONPATH
              value: "/app/deps"
            - name: TAILSCALE_DOMAIN
              value: {{ .Values.kloneApi.tailscaleDomain | quote }}
          volumeMounts:
            - name: klone-code
              mountPath: /config
              readOnly: true
            - name: app
              mountPath: /app
          resources:
            {{- toYaml .Values.kloneApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: klone-code
          configMap:
            name: klone
            defaultMode: 0555
        - name: app
          emptyDir: {}
{{- end }}
