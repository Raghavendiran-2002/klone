{{- if .Values.kloneApi.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: klone
  namespace: {{ .Values.kloneApi.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    {{- include "klone.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.class }}
  tls:
    - hosts:
        - {{ .Values.kloneApi.ingress.host }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: klone
                port:
                  name: http
{{- end }}
