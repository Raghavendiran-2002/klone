# klone-static — static single k3s cluster with web terminal
# This deploys a single pre-configured k3s cluster that's always available
klone:
  k3s:
    image: rancher/k3s:v1.35.1-k3s1  # Lightweight Kubernetes distribution
    token: supersecrettoken123  # Shared secret for k3s agent authentication
    controlPlane:
      replicas: 1
    worker:
      replicas: 2

  terminal:
    image: alpine:3.19
    replicas: 1

  storage:
    storageClass: local-path # Dynamic provisioner; switch to local-storage if pre-provisioned PVs exist
    size: 5Gi # Storage size for k3s datastore and cached binaries

  ingress:
    host: klone-terminal

# klone-api — REST API that manages multiple k3s clusters dynamically
kloneApi:
  enabled: true
  namespace: klone
  createNamespace: true

  image: python:3.12-slim
  replicas: 1
  tailscaleDomain: taile3ca5.ts.net

  nodeAffinity:
    enabled: false # Set to true and label a node with workload=primary for PV binding
    label: primary # Match the node label for persistent storage affinity

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  ingress:
    host: klone

# shared ingress settings
ingress:
  class: tailscale
