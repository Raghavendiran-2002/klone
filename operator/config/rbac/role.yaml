---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - klone.klone.io
  resources:
  - kloneclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - klone.klone.io
  resources:
  - kloneclusters/finalizers
  verbs:
  - update
- apiGroups:
  - klone.klone.io
  resources:
  - kloneclusters/status
  verbs:
  - get
  - patch
  - update
